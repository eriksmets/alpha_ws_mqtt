alpha:
  host: "192.168.18.100"
  port: 8214
  path: ""
  scheme: "ws"
  subprotocols:
    - "Lux_WS"

  login_message: "LOGIN;999999"
  information_menu_name: "Informatie"

  startup_delay_seconds: 0.5
  refresh_interval_seconds: 10
  socket_timeout_seconds: 2
  reconnect_delay_seconds: 10
  log_raw_chars: 400

mqtt:
  host: "192.168.18.253"
  port: 1883
  username: ""
  password: ""
  base_topic: "alpha_innotec"
  retain: true
  client_id: "alpha-innotec-ws-mqtt"
  discovery: true
  discovery_prefix: "homeassistant"

values:
  - section_path: ["Informatie", "Energiemonitor", "Gebruikte energie"]
    name: "Koeling"
    occurrence: 1
    label: "gebruikte_energie_koeling"
    display_name: "Gebruikte energie koeling WP"
    topic: "alpha_innotec/gebruikte_energie_koeling/state"
    unit: "kWh"
    device_class: "energy"
    state_class: "total_increasing"

  - section_path: ["Informatie", "Installatiestatus"]
